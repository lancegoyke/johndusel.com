services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: johndusel-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ALLOWED_HOSTS=localhost,backend,johndusel.com
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
      - STATIC_ROOT=/app/staticfiles
      - MEDIA_ROOT=/app/media
    volumes:
      # SQLite database persistence
      - ./data/db:/app/data
      # Media files (if not using S3)
      - ./data/media:/app/media
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/posts/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are build-time args - for static generation
        BASE_API_URL: http://backend:8000/api
        SITE_URL: ${SITE_URL:-http://localhost:3000}
    container_name: johndusel-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    container_name: johndusel-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
